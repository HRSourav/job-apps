<!DOCTYPE html>
<html>
<head>
  <title>RightO Hiring</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e3ecff, #f5f7fb);
      margin: 0;
    }

    .container {
      width: 420px;
      margin: 60px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .logo {
      text-align: center;
      margin-bottom: 15px;
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: gray;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #4b3cff, #6a5cff);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    .whatsapp {
      background: #25D366;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: gray;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

<div class="logo">
  <img src="logo.png" width="140">
</div>

<h2>Job Application</h2>
<p class="subtitle">Fill your details below</p>

<form onsubmit="submitForm(event)">

<label>Full Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Phone</label>
<input type="text" id="phone" required>

<label>Address</label>
<textarea id="address"></textarea>

<button type="submit">Submit Application</button>

</form>

<a href="https://wa.me/919876543210?text=Hi%20I%20applied%20for%20job" target="_blank">
  <button class="whatsapp">Chat on WhatsApp</button>
</a>

<p id="msg"></p>

<div class="footer">
  Your data is secure
</div>

</div>

<script>
function submitForm(e) {
  e.preventDefault();

  let data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  fetch("https://script.google.com/macros/s/AKfycbx_Ji8KbkhRXBBUIIHApRhbTTys_-PW96F_JPlODv-s6gjSJRjLjcyoI3vFNZo-4tRf/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("msg").innerHTML = "Application Submitted ✅";
  });
}
</script>

</body>
</html>
