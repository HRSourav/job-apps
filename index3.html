<!DOCTYPE html>
<html>
<head>
  <title>RightO Job Application</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #eef2f7, #dde6f0);
      margin: 0;
      padding: 0;
    }

    .container {
      width: 420px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: gray;
      font-size: 14px;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    textarea {
      height: 70px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #4b3cff, #6a5cff);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .whatsapp-btn {
      background: #25D366;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: gray;
      margin-top: 15px;
    }

  </style>
</head>

<body>

<div class="container">

<div class="logo">
  <img src="logo.png" width="140">
</div>

<h2>Job Application Form</h2>
<p class="subtitle">Please fill in your details below to apply</p>

<form onsubmit="submitForm(event)">

<label>Full Name *</label>
<input type="text" id="name" required>

<label>Email ID *</label>
<input type="email" id="email" required>

<label>Phone Number *</label>
<input type="text" id="phone" required>

<label>Alternate Number</label>
<input type="text" id="altphone">

<label>Aadhaar Number *</label>
<input type="text" id="aadhaar" required>

<label>Qualification *</label>
<input type="text" id="qualification" required>

<label>Current Address *</label>
<textarea id="address" required></textarea>

<label>Upload Resume *</label>
<input type="file">

<button type="submit">Submit Application</button>

</form>

<!-- WHATSAPP CTA -->
<a href="https://wa.me/91XXXXXXXXXX?text=Hi%20I%20want%20to%20apply%20for%20the%20job" target="_blank">
  <button class="whatsapp-btn">Chat on WhatsApp</button>
</a>

<p id="msg"></p>

<div class="footer">
  Your information is secure and will not be shared
</div>

</div>

<script>
function submitForm(e) {
  e.preventDefault();

  let data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    altphone: document.getElementById("altphone").value,
    aadhaar: document.getElementById("aadhaar").value,
    qualification: document.getElementById("qualification").value,
    address: document.getElementById("address").value
  };

  fetch("https://script.google.com/macros/s/AKfycbx_Ji8KbkhRXBBUIIHApRhbTTys_-PW96F_JPlODv-s6gjSJRjLjcyoI3vFNZo-4tRf/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("msg").innerHTML = "Application Submitted ✅";
  });
}
</script>

</body>
</html>
